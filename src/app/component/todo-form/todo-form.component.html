<mat-card class="mb-4 mb-md-0">
    <form #todoForm="ngForm" (ngSubmit)="onTodoSubmit()">
        <h3>
            {{isInEditMode ? 'Update Todo' : 'Add Todo'}}
        </h3>
        <div class="form-group">
            <label for="todoItem">Todo Item</label>
            <input
            
            name="todoItem"
            required
            ngModel 
            type="text" class="form-control">
        </div>
        
        <button 
        [disabled]="todoForm.invalid"
        *ngIf="!isInEditMode"
        mat-raised-button color="primary" class="w-100">Add Todo</button>

        <button
        [disabled]="todoForm.invalid"
        (click)="onTodoUpdate()"
         *ngIf="isInEditMode"
        mat-raised-button color="primary" class="w-100">Update Todo</button>
    </form>
</mat-card>
