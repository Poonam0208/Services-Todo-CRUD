

<mat-card>
    <ul  *ngIf="todoArr.length > 0 ;else noTodo"
    class="list-group" >
        <li *ngFor="let todo of todoArr"
         class="list-group-item d-flex justify-content-between">
            {{todo.todoItem}}

            <div>
            <button
             (click)="onTodoEdit(todo)"
             mat-mini-fab  color="primary" class="mr-2">
              <mat-icon>edit</mat-icon>
            </button>
            <button
            (click)="onRemove(todo.todoId)"
            mat-mini-fab  color="warn">
              <mat-icon>delete</mat-icon>
            </button>
        </div>
        </li>
        
    </ul>

    <ng-template #noTodo>
        <p class="alert alert-info">
            No Todo Data !!!
        </p>
    </ng-template>
</mat-card>
